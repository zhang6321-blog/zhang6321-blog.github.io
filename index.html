<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词汇大师 - Vocabulary Master</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#FAF7F2;--bg-secondary:#F0EBE3;--bg-card:#FFFFFF;
  --text-primary:#2C2C2C;--text-secondary:#6B6B6B;--text-muted:#999;
  --accent:#C84B31;--accent-light:#E8A87C;--accent-hover:#A83D28;
  --green:#2D6A4F;--green-light:#41B3A3;
  --cat-zhongkao:#E8A87C;--cat-gaokao:#D27D2D;--cat-cet4:#85CDCA;--cat-cet6:#C38D9E;--cat-kaoyan:#41B3A3;
  --border:#E0D8CE;--shadow:0 2px 8px rgba(0,0,0,0.06);
  --shadow-hover:0 4px 16px rgba(0,0,0,0.1);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --font-en:'Crimson Pro',Georgia,serif;
  --font-zh:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --transition:all 0.3s ease;
  --header-h:60px;--tabbar-h:60px;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-zh);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;line-height:1.6}
.word-font{font-family:var(--font-en)}

/* Header */
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;backdrop-filter:blur(10px);background:rgba(255,255,255,0.92)}
.header-logo{font-family:var(--font-en);font-size:1.4rem;font-weight:700;color:var(--accent);letter-spacing:-0.5px;cursor:pointer}
.header-logo span{color:var(--text-primary);font-weight:400}
.header-nav{display:flex;gap:4px}
.header-nav button{background:none;border:none;padding:8px 16px;border-radius:var(--radius-sm);font-size:0.9rem;color:var(--text-secondary);cursor:pointer;transition:var(--transition);font-family:var(--font-zh);min-height:44px}
.header-nav button:hover{background:var(--bg-secondary);color:var(--text-primary)}
.header-nav button.active{background:var(--accent);color:#fff;font-weight:500}

/* Bottom Tab Bar (mobile) */
.tabbar{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--tabbar-h);background:var(--bg-card);border-top:1px solid var(--border);z-index:100;padding:0 8px;padding-bottom:env(safe-area-inset-bottom)}
.tabbar-inner{display:flex;height:100%}
.tabbar button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text-muted);cursor:pointer;transition:var(--transition);font-family:var(--font-zh);font-size:0.7rem;min-height:44px;padding:4px 0}
.tabbar button.active{color:var(--accent)}
.tabbar button svg{width:22px;height:22px}
.tabbar button .tab-label{font-size:0.65rem}

/* Main Content */
.main{padding-top:var(--header-h);min-height:100vh}
.view{display:none;animation:fadeIn 0.3s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.container{max-width:1100px;margin:0 auto;padding:20px 16px}

/* Home View */
.hero{text-align:center;padding:48px 20px 32px}
.hero h1{font-family:var(--font-en);font-size:2.8rem;font-weight:700;color:var(--text-primary);letter-spacing:-1px;margin-bottom:8px}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{color:var(--text-secondary);font-size:1.05rem}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:24px}
.cat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:var(--transition);position:relative;overflow:hidden}
.cat-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
.cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.cat-card[data-cat="zhongkao"]::before{background:var(--cat-zhongkao)}
.cat-card[data-cat="gaokao"]::before{background:var(--cat-gaokao)}
.cat-card[data-cat="cet4"]::before{background:var(--cat-cet4)}
.cat-card[data-cat="cet6"]::before{background:var(--cat-cet6)}
.cat-card[data-cat="kaoyan"]::before{background:var(--cat-kaoyan)}
.cat-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cat-card-name{font-size:1.15rem;font-weight:600}
.cat-card-count{font-size:0.85rem;color:var(--text-muted)}
.cat-card-stats{display:flex;gap:16px;font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px}
.cat-card-stats strong{color:var(--text-primary)}
.progress-bar{height:6px;background:var(--bg-secondary);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.cat-card[data-cat="zhongkao"] .progress-bar-fill{background:var(--cat-zhongkao)}
.cat-card[data-cat="gaokao"] .progress-bar-fill{background:var(--cat-gaokao)}
.cat-card[data-cat="cet4"] .progress-bar-fill{background:var(--cat-cet4)}
.cat-card[data-cat="cet6"] .progress-bar-fill{background:var(--cat-cet6)}
.cat-card[data-cat="kaoyan"] .progress-bar-fill{background:var(--cat-kaoyan)}
.continue-section{margin-top:32px;text-align:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border-radius:var(--radius-sm);font-size:0.95rem;font-weight:500;border:none;cursor:pointer;transition:var(--transition);min-height:44px;font-family:var(--font-zh)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#245a42}
.btn-sm{padding:6px 14px;font-size:0.85rem;min-height:36px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:var(--bg-secondary);border:1px solid var(--border);cursor:pointer;transition:var(--transition);color:var(--text-secondary)}
.btn-icon:hover{background:var(--border);color:var(--text-primary)}
.btn-icon.starred{color:#E8A87C;border-color:#E8A87C}

/* Browse View */
.browse-header{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.browse-tabs{display:flex;gap:4px;flex-wrap:wrap}
.browse-tab{padding:6px 14px;border-radius:20px;font-size:0.85rem;border:1px solid var(--border);background:var(--bg-card);cursor:pointer;transition:var(--transition);min-height:36px;font-family:var(--font-zh);color:var(--text-secondary)}
.browse-tab:hover{border-color:var(--text-muted)}
.browse-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.search-box{position:relative;flex:1;min-width:200px}
.search-box input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.95rem;background:var(--bg-card);transition:var(--transition);font-family:var(--font-zh)}
.search-box input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,75,49,0.1)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);width:18px;height:18px}
.browse-layout{display:flex;gap:16px}
.letter-index{display:flex;flex-direction:column;gap:2px;position:sticky;top:calc(var(--header-h) + 16px);align-self:flex-start;max-height:calc(100vh - var(--header-h) - 32px);overflow-y:auto}
.letter-index a{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:0.75rem;font-weight:600;color:var(--text-secondary);text-decoration:none;transition:var(--transition);font-family:var(--font-en)}
.letter-index a:hover,.letter-index a.active{background:var(--accent);color:#fff}
.word-list{flex:1;max-height:calc(100vh - var(--header-h) - 140px);overflow-y:auto;padding-right:8px}
.word-group{margin-bottom:20px}
.word-group-letter{font-family:var(--font-en);font-size:1.4rem;font-weight:700;color:var(--accent);margin-bottom:8px;padding:4px 0;border-bottom:2px solid var(--bg-secondary);position:sticky;top:0;background:var(--bg-primary);z-index:5}
.word-item{display:flex;align-items:center;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid transparent;transition:var(--transition);gap:12px;cursor:pointer}
.word-item:hover{background:var(--bg-secondary);border-color:var(--border)}
.word-item.expanded{background:var(--bg-card);border-color:var(--border);box-shadow:var(--shadow)}
.word-item-main{flex:1;min-width:0}
.word-item-word{font-family:var(--font-en);font-size:1.1rem;font-weight:600;color:var(--text-primary)}
.word-item-phonetic{font-family:var(--font-en);font-size:0.8rem;color:var(--text-muted);margin-left:8px}
.word-item-pos{font-size:0.75rem;color:var(--accent);margin-left:8px;font-weight:500}
.word-item-meaning{font-size:0.9rem;color:var(--text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.word-item.expanded .word-item-meaning{white-space:normal;overflow:visible}
.word-item-actions{display:flex;gap:4px;flex-shrink:0}
.word-item-actions button{width:32px;height:32px;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);background:transparent;color:var(--text-muted);font-size:0.85rem}
.word-item-actions button:hover{background:var(--bg-secondary)}
.word-item-actions button.learned{color:var(--green)}
.word-item-actions button.starred{color:#E8A87C}
.browse-info{color:var(--text-muted);font-size:0.85rem;margin-bottom:12px}
.load-more{text-align:center;padding:16px}
.mobile-letter-bar{display:none;overflow-x:auto;white-space:nowrap;padding:8px 0;gap:4px;-webkit-overflow-scrolling:touch}
.mobile-letter-bar a{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;padding:0 6px;border-radius:14px;font-size:0.75rem;font-weight:600;color:var(--text-secondary);text-decoration:none;transition:var(--transition);font-family:var(--font-en)}
.mobile-letter-bar a:hover,.mobile-letter-bar a.active{background:var(--accent);color:#fff}

/* Flashcard View */
.flashcard-settings,.quiz-settings{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.settings-title{font-size:1.1rem;font-weight:600;margin-bottom:16px}
.settings-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.settings-label{font-size:0.9rem;color:var(--text-secondary);min-width:80px}
.settings-row select,.settings-row input{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;background:var(--bg-primary);font-family:var(--font-zh);min-height:40px}
.settings-row select:focus,.settings-row input:focus{outline:none;border-color:var(--accent)}
.flashcard-area{display:flex;flex-direction:column;align-items:center;padding:20px 0}
.flashcard-progress{font-size:0.9rem;color:var(--text-secondary);margin-bottom:16px}
.flashcard-progress strong{color:var(--text-primary)}
.flashcard-container{perspective:1000px;width:100%;max-width:480px;height:300px;margin-bottom:24px;cursor:pointer}
.flashcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.6s ease}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;border:1px solid var(--border);box-shadow:var(--shadow)}
.flashcard-front{background:var(--bg-card)}
.flashcard-back{background:var(--bg-card);transform:rotateY(180deg)}
.flashcard-word{font-family:var(--font-en);font-size:2.2rem;font-weight:700;color:var(--text-primary);margin-bottom:8px}
.flashcard-phonetic{font-family:var(--font-en);font-size:1rem;color:var(--text-muted);margin-bottom:4px}
.flashcard-pos{font-size:0.9rem;color:var(--accent);margin-bottom:4px}
.flashcard-meaning{font-size:1.3rem;color:var(--text-primary);text-align:center;line-height:1.8}
.flashcard-hint{font-size:0.8rem;color:var(--text-muted);margin-top:16px}
.flashcard-level{display:flex;gap:4px;margin-top:8px}
.flashcard-level span{width:8px;height:8px;border-radius:50%;background:var(--bg-secondary)}
.flashcard-level span.filled{background:var(--green)}
.flashcard-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.flashcard-buttons .btn{min-width:100px}
.btn-know{background:#2D6A4F;color:#fff}
.btn-know:hover{background:#245a42}
.btn-dontknow{background:#C84B31;color:#fff}
.btn-dontknow:hover{background:#A83D28}
.btn-skip{background:var(--bg-secondary);color:var(--text-secondary);border:1px solid var(--border)}
.btn-skip:hover{background:var(--border)}
.flashcard-complete{text-align:center;padding:40px 20px}
.flashcard-complete h2{font-size:1.5rem;margin-bottom:12px}
.flashcard-complete p{color:var(--text-secondary);margin-bottom:20px}
.keyboard-hint{color:var(--text-muted);font-size:0.8rem;margin-top:12px;text-align:center}

/* Quiz View */
.quiz-area{max-width:640px;margin:0 auto}
.quiz-question{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center;margin-bottom:20px}
.quiz-question-word{font-family:var(--font-en);font-size:2rem;font-weight:700;margin-bottom:8px}
.quiz-question-phonetic{font-family:var(--font-en);font-size:0.95rem;color:var(--text-muted);margin-bottom:4px}
.quiz-question-pos{font-size:0.85rem;color:var(--accent);margin-bottom:4px}
.quiz-question-prompt{font-size:0.9rem;color:var(--text-secondary);margin-bottom:4px}
.quiz-timer{font-size:0.85rem;color:var(--text-muted);margin-top:8px}
.quiz-timer svg{width:16px;height:16px;vertical-align:middle;margin-right:4px}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.quiz-option{padding:16px;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg-card);cursor:pointer;transition:var(--transition);text-align:center;font-size:1rem;min-height:52px;display:flex;align-items:center;justify-content:center;font-family:var(--font-zh)}
.quiz-option:hover{border-color:var(--accent);background:rgba(200,75,49,0.03)}
.quiz-option.correct{border-color:var(--green);background:rgba(45,106,79,0.08);color:var(--green);font-weight:600}
.quiz-option.wrong{border-color:var(--accent);background:rgba(200,75,49,0.08);color:var(--accent)}
.quiz-option.disabled{pointer-events:none;opacity:0.7}
.quiz-option .word-font{font-family:var(--font-en);font-size:1.1rem}
.quiz-spelling{margin-bottom:20px}
.quiz-spelling input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius);font-size:1.2rem;text-align:center;font-family:var(--font-en);transition:var(--transition)}
.quiz-spelling input:focus{outline:none;border-color:var(--accent)}
.quiz-spelling input.correct{border-color:var(--green);background:rgba(45,106,79,0.05)}
.quiz-spelling input.wrong{border-color:var(--accent);background:rgba(200,75,49,0.05)}
.quiz-spelling .answer-reveal{margin-top:8px;font-size:1.1rem;color:var(--green);font-weight:600}
.quiz-progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.quiz-score{font-size:0.9rem;color:var(--text-secondary)}
.quiz-score strong{color:var(--accent);font-size:1.1rem}
.quiz-streak{font-size:0.85rem;color:#E8A87C}
.quiz-results{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center}
.quiz-results h2{font-size:1.5rem;margin-bottom:16px}
.quiz-results-stats{display:flex;justify-content:center;gap:32px;margin-bottom:24px}
.quiz-results-stat{text-align:center}
.quiz-results-stat .num{font-size:2rem;font-weight:700;font-family:var(--font-en)}
.quiz-results-stat .label{font-size:0.85rem;color:var(--text-secondary)}
.quiz-wrong-list{text-align:left;margin-top:16px}
.quiz-wrong-list h3{font-size:1rem;margin-bottom:8px}
.quiz-wrong-item{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--bg-secondary);font-size:0.9rem}
.quiz-wrong-item .word-font{font-weight:600}

/* Stats View */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.stat-ring-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.stat-ring{position:relative;width:100px;height:100px;margin:0 auto 12px}
.stat-ring svg{transform:rotate(-90deg)}
.stat-ring-bg{fill:none;stroke:var(--bg-secondary);stroke-width:8}
.stat-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.stat-ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-en);font-size:1.3rem;font-weight:700}
.stat-ring-label{font-size:0.9rem;font-weight:500;margin-bottom:4px}
.stat-ring-sub{font-size:0.8rem;color:var(--text-muted)}
.daily-chart{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.daily-chart h3{font-size:1.05rem;margin-bottom:16px}
.chart-bars{display:flex;align-items:flex-end;justify-content:space-around;height:160px;padding:0 8px}
.chart-bar-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.chart-bar{width:100%;max-width:48px;background:var(--accent);border-radius:4px 4px 0 0;transition:height 0.5s ease;min-height:4px;position:relative}
.chart-bar:hover{opacity:0.85}
.chart-bar-value{font-size:0.7rem;color:var(--text-muted);font-family:var(--font-en)}
.chart-bar-label{font-size:0.75rem;color:var(--text-secondary)}
.wrong-notebook{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.wrong-notebook h3{font-size:1.05rem;margin-bottom:16px}
.wrong-list{max-height:400px;overflow-y:auto}
.wrong-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--bg-secondary);gap:12px}
.wrong-item:last-child{border-bottom:none}
.wrong-item-word{font-family:var(--font-en);font-weight:600;font-size:1rem}
.wrong-item-meaning{font-size:0.85rem;color:var(--text-secondary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wrong-item-cat{font-size:0.75rem;padding:2px 8px;border-radius:10px;background:var(--bg-secondary);color:var(--text-secondary);flex-shrink:0}
.reset-section{text-align:center;padding:16px}
.reset-section .btn{color:var(--accent);border:1px solid var(--accent);background:transparent}
.reset-section .btn:hover{background:rgba(200,75,49,0.05)}

/* Empty state */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-muted)}
.empty-state svg{width:64px;height:64px;margin-bottom:16px;opacity:0.4}
.empty-state p{font-size:1rem}

/* Toast */
.toast{position:fixed;top:calc(var(--header-h) + 16px);left:50%;transform:translateX(-50%) translateY(-20px);background:var(--text-primary);color:#fff;padding:10px 24px;border-radius:var(--radius-sm);font-size:0.9rem;z-index:200;opacity:0;transition:all 0.3s ease;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:150;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border-radius:var(--radius-lg);padding:32px;max-width:400px;width:100%;text-align:center}
.modal h3{margin-bottom:12px;font-size:1.15rem}
.modal p{color:var(--text-secondary);margin-bottom:20px;font-size:0.95rem}
.modal-buttons{display:flex;gap:12px;justify-content:center}

/* Scrollbar */
.word-list::-webkit-scrollbar,.wrong-list::-webkit-scrollbar,.letter-index::-webkit-scrollbar{width:4px}
.word-list::-webkit-scrollbar-thumb,.wrong-list::-webkit-scrollbar-thumb,.letter-index::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Responsive */
@media(max-width:1024px){
  .cat-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .stats-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
@media(max-width:768px){
  .header-nav{display:none}
  .tabbar{display:block}
  .main{padding-bottom:calc(var(--tabbar-h) + env(safe-area-inset-bottom))}
  .hero h1{font-size:2rem}

const CATEGORIES = [
  {id:'zhongkao', name:'中考词汇', color:'var(--cat-zhongkao)', data:()=>VOCAB_ZHONGKAO},
  {id:'gaokao', name:'高考词汇', color:'var(--cat-gaokao)', data:()=>VOCAB_GAOKAO},

// ===== Storage =====
function loadData(){
  try{return JSON.parse(localStorage.getItem('vocab_master')||'{}')}catch(e){return{}}
}
function saveData(d){
  try{localStorage.setItem('vocab_master',JSON.stringify(d))}catch(e){}
}
function getWordKey(cat,idx){return cat+'_'+idx}
function getWordProgress(cat,idx){
  const d=loadData();
  return d.words&&d.words[getWordKey(cat,idx)]||{level:0,lastReview:0,starred:false};
}
function setWordProgress(cat,idx,prog){
  const d=loadData();
  if(!d.words)d.words={};
  d.words[getWordKey(cat,idx)]={...getWordProgress(cat,idx),...prog};
  saveData(d);
}
function getDailyStats(dateStr){
  const d=loadData();
  return d.daily&&d.daily[dateStr]||{new:0,reviewed:0,quizScore:0};
}
function setDailyStats(dateStr,stats){
  const d=loadData();
  if(!d.daily)d.daily={};
  d.daily[dateStr]={...getDailyStats(dateStr),...stats};
  saveData(d);
}
function getWrongWords(){
  const d=loadData();
  return d.wrongWords||[];
}
function addWrongWord(cat,idx,word,meaning){
  const d=loadData();
  if(!d.wrongWords)d.wrongWords=[];
  const key=getWordKey(cat,idx);
  d.wrongWords=d.wrongWords.filter(w=>w.key!==key);
  d.wrongWords.unshift({key,cat,idx,word,meaning,time:Date.now()});
  if(d.wrongWords.length>500)d.wrongWords=d.wrongWords.slice(0,500);
  saveData(d);
}
function removeWrongWord(key){
  const d=loadData();
  if(!d.wrongWords)return;
  d.wrongWords=d.wrongWords.filter(w=>w.key!==key);
  saveData(d);
}
function getCatLearnedCount(cat){
  const d=loadData();
  if(!d.words)return 0;
  const arr=cat==='zhongkao'?VOCAB_ZHONGKAO:cat==='gaokao'?VOCAB_GAOKAO:cat==='cet4'?VOCAB_CET4:cat==='cet6'?VOCAB_CET6:VOCAB_KAOYAN;
  let c=0;
  for(let i=0;i<arr.length;i++){if(d.words[cat+'_'+i]&&d.words[cat+'_'+i].level>=3)c++;}
  return c;
}
function todayStr(){return new Date().toISOString().slice(0,10)}

// ===== Toast =====
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

// ===== Modal =====
function showResetModal(){document.getElementById('resetModal').classList.add('show')}
function closeModal(){document.getElementById('resetModal').classList.remove('show')}
function confirmReset(){
  localStorage.removeItem('vocab_master');
  closeModal();
  showToast('数据已重置');
  renderCurrentView();
}

// ===== View Switching =====
let currentView='home';
function switchView(view){
  currentView=view;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelectorAll('.header-nav button').forEach(b=>{b.classList.toggle('active',b.dataset.view===view)});
  document.querySelectorAll('.tabbar button').forEach(b=>{b.classList.toggle('active',b.dataset.view===view)});
  renderCurrentView();
}
function renderCurrentView(){
  switch(currentView){
    case'home':renderHome();break;
    case'browse':renderBrowse();break;
    case'flashcard':renderFlashcard();break;
    case'quiz':renderQuiz();break;
    case'stats':renderStats();break;
  }
}

// ===== Home View =====
function renderHome(){
  const grid=document.getElementById('catGrid');
  const cont=document.getElementById('continueSection');
  let html='';
  let totalLearned=0,totalWords=0;
  let lastCat=null,lastCount=0;
  CATEGORIES.forEach(cat=>{
    const arr=cat.data();
    const learned=getCatLearnedCount(cat.id);
    totalLearned+=learned;totalWords+=arr.length;
    const pct=arr.length?Math.round(learned/arr.length*100):0;
    html+=`<div class="cat-card" data-cat="${cat.id}" onclick="switchView('browse');selectBrowseCat('${cat.id}')">
      <div class="cat-card-header">
        <span class="cat-card-name">${cat.name}</span>
        <span class="cat-card-count">${arr.length} 词</span>
      </div>
      <div class="cat-card-stats">
        <span>已学 <strong>${learned}</strong></span>
        <span>未学 <strong>${arr.length-learned}</strong></span>
        <span>${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
    if(learned>lastCount){lastCount=learned;lastCat=cat;}
  });
  grid.innerHTML=html;
  if(lastCat){
    const arr=lastCat.data();
    const learned=getCatLearnedCount(lastCat.id);
    const remaining=arr.length-learned;
    cont.innerHTML=remaining>0?`<button class="btn btn-primary" onclick="switchView('flashcard');document.getElementById('fcCategory').value='${lastCat.id}';document.getElementById('fcRange').value='new';startFlashcard()">继续学习 ${lastCat.name}（剩余 ${remaining} 词）</button>`:`<p style="color:var(--text-secondary)">所有词库已学完！试试测验巩固一下吧。</p>`;
  }else{
    cont.innerHTML=`<button class="btn btn-primary" onclick="switchView('flashcard')">开始学习</button>`;
  }
}

// ===== Browse View =====
let browseCat='zhongkao';
let browseSearch='';
let browseExpanded=null;
let browseRenderedCount=0;
const BROWSE_PAGE_SIZE=80;
let browseFilteredWords=[];

function selectBrowseCat(cat){
  browseCat=cat;
  renderBrowse();
}

function renderBrowse(){
  // Tabs
  const tabs=document.getElementById('browseTabs');
  tabs.innerHTML=CATEGORIES.map(c=>`<button class="browse-tab${c.id===browseCat?' active':''}" onclick="browseCat='${c.id}';renderBrowse()">${c.name}</button>`).join('');

  // Filter words
  const arr=(browseCat==='zhongkao'?VOCAB_ZHONGKAO:browseCat==='gaokao'?VOCAB_GAOKAO:browseCat==='cet4'?VOCAB_CET4:browseCat==='cet6'?VOCAB_CET6:VOCAB_KAOYAN);
  const q=browseSearch.toLowerCase().trim();
  browseFilteredWords=[];
  if(q){
    arr.forEach((w,i)=>{if(w.w.toLowerCase().includes(q)||w.m.includes(q))browseFilteredWords.push({...w,idx:i})});
  }else{
    arr.forEach((w,i)=>browseFilteredWords.push({...w,idx:i}));
  }

  // Info
  document.getElementById('browseInfo').textContent=`共 ${browseFilteredWords.length} 个单词`;

  // Letter index
  const letters=new Set();
  browseFilteredWords.forEach(w=>{const l=w.w[0].toUpperCase();if(/[A-Z]/.test(l))letters.add(l)});
  const sortedLetters=[...letters].sort();
  const letterIndex=document.getElementById('letterIndex');
  const mobileBar=document.getElementById('mobileLetterBar');
  letterIndex.innerHTML=sortedLetters.map(l=>`<a href="#" onclick="scrollToLetter('${l}');return false">${l}</a>`).join('');
  mobileBar.innerHTML=sortedLetters.map(l=>`<a href="#" onclick="scrollToLetter('${l}');return false">${l}</a>`).join('');

  // Reset pagination
  browseRenderedCount=0;
  browseExpanded=null;
  const list=document.getElementById('wordList');
  list.innerHTML='';
  loadMoreWords();
  list.onscroll=function(){
    if(list.scrollTop+list.clientHeight>=list.scrollHeight-100)loadMoreWords();
  };
}

function loadMoreWords(){
  const list=document.getElementById('wordList');
  const end=Math.min(browseRenderedCount+BROWSE_PAGE_SIZE,browseFilteredWords.length);
  if(browseRenderedCount>=browseFilteredWords.length)return;

  // Group by letter
  const slice=browseFilteredWords.slice(browseRenderedCount,end);
  let html='';
  let currentLetter='';
  slice.forEach(w=>{
    const l=w.w[0].toUpperCase();
    if(/[A-Z]/.test(l)&&l!==currentLetter){
      currentLetter=l;
      html+=`<div class="word-group" id="letter-${l}"><div class="word-group-letter">${l}</div>`;
    }
    const prog=getWordProgress(browseCat,w.idx);
    const isLearned=prog.level>=3;
    const isStarred=prog.starred;
    const isExpanded=browseExpanded===w.idx;
    html+=`<div class="word-item${isExpanded?' expanded':''}" onclick="toggleWordExpand(${w.idx})">
      <div class="word-item-main">
        <div><span class="word-item-word word-font">${escHtml(w.w)}</span>${w.p?`<span class="word-item-phonetic word-font">${escHtml(w.p)}</span>`:''}${w.t?`<span class="word-item-pos">${escHtml(w.t)}</span>`:''}</div>
        <div class="word-item-meaning">${escHtml(w.m)}</div>
      </div>
      <div class="word-item-actions" onclick="event.stopPropagation()">
        <button class="${isLearned?'learned':''}" onclick="toggleLearned(${w.idx})" title="${isLearned?'取消已学':'标记已学'}">${isLearned?'&#10003;':'&#9675;'}</button>
        <button class="${isStarred?'starred':''}" onclick="toggleStarred(${w.idx})" title="${isStarred?'取消收藏':'收藏'}">${isStarred?'&#9733;':'&#9734;'}</button>
      </div>
    </div>`;
  });
  // Close last group
  if(currentLetter)html+='</div>';
  list.insertAdjacentHTML('beforeend',html);
  browseRenderedCount=end;
}

function toggleWordExpand(idx){
  browseExpanded=browseExpanded===idx?null:idx;
  // Re-render
  const list=document.getElementById('wordList');
  list.innerHTML='';
  browseRenderedCount=0;
  loadMoreWords();
}

function toggleLearned(idx){
  const prog=getWordProgress(browseCat,idx);
  const newLevel=prog.level>=3?0:3;
  setWordProgress(browseCat,idx,{level:newLevel});
  if(newLevel>=3){
    const ds=todayStr();
    const s=getDailyStats(ds);
    setDailyStats(ds,{new:s.new+1});
  }
  showToast(newLevel>=3?'已标记为已学':'已取消已学');
  renderBrowse();
}

function toggleStarred(idx){
  const prog=getWordProgress(browseCat,idx);
  setWordProgress(browseCat,idx,{starred:!prog.starred});
  showToast(prog.starred?'已取消收藏':'已收藏');
  renderBrowse();
}

function scrollToLetter(l){
  const el=document.getElementById('letter-'+l);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}

function handleSearch(){
  browseSearch=document.getElementById('searchInput').value;
  renderBrowse();
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== Flashcard View =====
let fcCards=[];
let fcIndex=0;
let fcFlipped=false;
let fcResults={know:0,dontknow:0,skip:0};

function renderFlashcard(){
  document.getElementById('flashcardSettings').style.display='';
  document.getElementById('flashcardArea').style.display='none';
}

function startFlashcard(){
  const cat=document.getElementById('fcCategory').value;
  const range=document.getElementById('fcRange').value;
  const count=parseInt(document.getElementById('fcCount').value);
  const arr=cat==='zhongkao'?VOCAB_ZHONGKAO:cat==='gaokao'?VOCAB_GAOKAO:cat==='cet4'?VOCAB_CET4:cat==='cet6'?VOCAB_CET6:VOCAB_KAOYAN;

  let pool=[];
  arr.forEach((w,i)=>{
    const prog=getWordProgress(cat,i);
    if(range==='all')pool.push({...w,idx:i,cat});
    else if(range==='new'&&prog.level===0)pool.push({...w,idx:i,cat});
    else if(range==='learning'&&prog.level>0&&prog.level<3)pool.push({...w,idx:i,cat});
    else if(range==='wrong'&&prog.level<3)pool.push({...w,idx:i,cat});
  });

  // Shuffle
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}

  fcCards=pool.slice(0,count);
  fcIndex=0;fcFlipped=false;
  fcResults={know:0,dontknow:0,skip:0};

  if(fcCards.length===0){
    showToast('没有符合条件的单词');
    return;
  }

  document.getElementById('flashcardSettings').style.display='none';
  document.getElementById('flashcardArea').style.display='';
  renderFlashcardCard();
}

function renderFlashcardCard(){
  const area=document.getElementById('flashcardArea');
  if(fcIndex>=fcCards.length){
    // Complete
    const total=fcCards.length;
    const pct=total?Math.round(fcResults.know/total*100):0;
    area.innerHTML=`<div class="flashcard-complete">
      <h2>学习完成！</h2>
      <p>本轮共学习 ${total} 个单词</p>
      <div style="display:flex;justify-content:center;gap:24px;margin-bottom:24px">
        <div style="text-align:center"><div style="font-size:2rem;font-weight:700;color:var(--green)">${fcResults.know}</div><div style="font-size:0.85rem;color:var(--text-secondary)">认识</div></div>
        <div style="text-align:center"><div style="font-size:2rem;font-weight:700;color:var(--accent)">${fcResults.dontknow}</div><div style="font-size:0.85rem;color:var(--text-secondary)">不认识</div></div>
        <div style="text-align:center"><div style="font-size:2rem;font-weight:700;color:var(--text-muted)">${fcResults.skip}</div><div style="font-size:0.85rem;color:var(--text-secondary)">跳过</div></div>
      </div>
      <p style="font-size:1.1rem;color:var(--green);font-weight:600">正确率 ${pct}%</p>
      <div style="margin-top:24px;display:flex;gap:12px;justify-content:center">
        <button class="btn btn-primary" onclick="startFlashcard()">再来一轮</button>
        <button class="btn btn-secondary" onclick="renderFlashcard()">返回设置</button>
      </div>
    </div>`;
    // Record daily
    const ds=todayStr();
    const s=getDailyStats(ds);
    setDailyStats(ds,{reviewed:s.reviewed+total});
    return;
  }

  const card=fcCards[fcIndex];
  const prog=getWordProgress(card.cat,card.idx);
  const levelDots=Array.from({length:5},(_,i)=>`<span class="${i<prog.level?'filled':''}"></span>`).join('');

  area.innerHTML=`<div class="flashcard-progress">第 <strong>${fcIndex+1}</strong> / ${fcCards.length} 个</div>
    <div class="flashcard-container" onclick="flipCard()">
      <div class="flashcard${fcFlipped?' flipped':''}" id="flashcardEl">
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-word word-font">${escHtml(card.w)}</div>
          ${card.p?`<div class="flashcard-phonetic word-font">${escHtml(card.p)}</div>`:''}
          ${card.t?`<div class="flashcard-pos">${escHtml(card.t)}</div>`:''}
          <div class="flashcard-level">${levelDots}</div>
          <div class="flashcard-hint">点击翻转查看释义</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="flashcard-meaning">${escHtml(card.m)}</div>
          <div style="margin-top:12px;font-family:var(--font-en);font-size:1.2rem;color:var(--text-secondary)">${escHtml(card.w)}</div>
        </div>
      </div>
    </div>
    <div class="flashcard-buttons">
      <button class="btn btn-dontknow" onclick="fcAnswer('dontknow')">不认识</button>
      <button class="btn btn-skip" onclick="fcAnswer('skip')">跳过</button>
      <button class="btn btn-know" onclick="fcAnswer('know')">认识</button>
    </div>
    <div class="keyboard-hint">快捷键：空格翻转 ← 不认识 → 认识</div>`;
  fcFlipped=false;
}

function flipCard(){
  fcFlipped=!fcFlipped;
  const el=document.getElementById('flashcardEl');
  if(el)el.classList.toggle('flipped',fcFlipped);
}

function fcAnswer(type){
  const card=fcCards[fcIndex];
  const prog=getWordProgress(card.cat,card.idx);
  let newLevel=prog.level;
  if(type==='know'){
    fcResults.know++;
    newLevel=Math.min(5,prog.level+1);
  }else if(type==='dontknow'){
    fcResults.dontknow++;
    newLevel=0;
    addWrongWord(card.cat,card.idx,card.w,card.m);
  }else{
    fcResults.skip++;
  }
  setWordProgress(card.cat,card.idx,{level:newLevel,lastReview:Date.now()});
  fcIndex++;
  renderFlashcardCard();
}

// ===== Quiz View =====
let quizQuestions=[];
let quizIndex=0;
let quizScore=0;
let quizStreak=0;
let quizMaxStreak=0;
let quizWrong=[];
let quizStartTime=0;
let quizTimerInterval=null;
let quizTimeLeft=0;
let quizAnswered=false;

function renderQuiz(){
  document.getElementById('quizSettings').style.display='';
  document.getElementById('quizArea').style.display='none';
}

function startQuiz(){
  const cat=document.getElementById('qzCategory').value;
  const type=document.getElementById('qzType').value;
  const count=parseInt(document.getElementById('qzCount').value);
  const arr=cat==='zhongkao'?VOCAB_ZHONGKAO:cat==='gaokao'?VOCAB_GAOKAO:cat==='cet4'?VOCAB_CET4:cat==='cet6'?VOCAB_CET6:VOCAB_KAOYAN;

  // Shuffle and pick
  let indices=arr.map((_,i)=>i);
  for(let i=indices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]];}
  indices=indices.slice(0,count);

  quizQuestions=indices.map(i=>{
    const word=arr[i];
    // Generate distractors
    let distractors=[];
    const attempts=20;
    for(let a=0;a<attempts&&distractors.length<3;a++){
      const ri=Math.floor(Math.random()*arr.length);
      if(ri!==i&&!distractors.some(d=>d.idx===ri)){
        distractors.push({idx:ri,...arr[ri]});
      }
    }
    // Fill remaining distractors if needed
    while(distractors.length<3){
      const ri=(i+distractors.length+1)%arr.length;
      if(!distractors.some(d=>d.idx===ri))distractors.push({idx:ri,...arr[ri]});
      else distractors.push({idx:ri,w:'(unknown)',m:'(unknown)'});
    }
    // Shuffle options
    let options=[{idx:i,...word,correct:true},...distractors.map(d=>({...d,correct:false}))];
    for(let j=options.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[options[j],options[k]]=[options[k],options[j]];}
    return{word,idx:i,cat,options,type};
  });

  quizIndex=0;quizScore=0;quizStreak=0;quizMaxStreak=0;quizWrong=[];
  quizStartTime=Date.now();quizAnswered=false;

  document.getElementById('quizSettings').style.display='none';
  document.getElementById('quizArea').style.display='';
  renderQuizQuestion();
}

function renderQuizQuestion(){
  const area=document.getElementById('quizArea');
  if(quizIndex>=quizQuestions.length){
    renderQuizResults();
    return;
  }

  const q=quizQuestions[quizIndex];
  quizAnswered=false;
  quizTimeLeft=15;
  clearInterval(quizTimerInterval);

  let questionHtml='';
  let optionsHtml='';

  if(q.type==='en2zh'){
    questionHtml=`<div class="quiz-question-prompt">请选择正确的中文释义</div>
      <div class="quiz-question-word word-font">${escHtml(q.word.w)}</div>
      ${q.word.p?`<div class="quiz-question-phonetic word-font">${escHtml(q.word.p)}</div>`:''}
      ${q.word.t?`<div class="quiz-question-pos">${escHtml(q.word.t)}</div>`:''}`;
    optionsHtml=q.options.map((o,i)=>`<div class="quiz-option" onclick="quizSelect(${i})" data-idx="${i}">${escHtml(o.m)}</div>`).join('');
  }else if(q.type==='zh2en'){
    questionHtml=`<div class="quiz-question-prompt">请选择正确的英文单词</div>
      <div class="quiz-question-word" style="font-size:1.3rem">${escHtml(q.word.m)}</div>`;
    optionsHtml=q.options.map((o,i)=>`<div class="quiz-option" onclick="quizSelect(${i})" data-idx="${i}"><span class="word-font">${escHtml(o.w)}</span></div>`).join('');
  }else{
    // Spelling
    questionHtml=`<div class="quiz-question-prompt">请拼写该单词</div>
      <div class="quiz-question-word" style="font-size:1.3rem">${escHtml(q.word.m)}</div>
      ${q.word.t?`<div class="quiz-question-pos">${escHtml(q.word.t)}</div>`:''}`;
    optionsHtml=`<div class="quiz-spelling">
      <input type="text" id="spellingInput" placeholder="输入英文单词..." autocomplete="off" autocapitalize="off" onkeydown="if(event.key==='Enter')quizSpellingSubmit()">
      <div id="spellingFeedback"></div>
    </div>
    <div style="text-align:center"><button class="btn btn-primary" onclick="quizSpellingSubmit()">确认</button></div>`;
  }

  area.innerHTML=`<div class="quiz-progress">
    <span>第 ${quizIndex+1} / ${quizQuestions.length} 题</span>
    <span class="quiz-score">得分 <strong>${quizScore}</strong></span>
    ${quizStreak>1?`<span class="quiz-streak">🔥 连对 ${quizStreak}</span>`:''}
  </div>
  <div class="quiz-question">${questionHtml}<div class="quiz-timer" id="quizTimer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span id="timerText">${quizTimeLeft}s</span></div></div>
  <div class="quiz-options" id="quizOptions">${optionsHtml}</div>`;

  if(q.type==='spelling'){
    setTimeout(()=>{const inp=document.getElementById('spellingInput');if(inp)inp.focus();},100);
  }

  quizTimerInterval=setInterval(()=>{
    quizTimeLeft--;
    const tt=document.getElementById('timerText');
    if(tt)tt.textContent=quizTimeLeft+'s';
    if(quizTimeLeft<=0){
      clearInterval(quizTimerInterval);
      if(!quizAnswered)quizTimeout();
    }
  },1000);
}

function quizSelect(optIdx){
  if(quizAnswered)return;
  quizAnswered=true;
  clearInterval(quizTimerInterval);

  const q=quizQuestions[quizIndex];
  const selected=q.options[optIdx];
  const isCorrect=selected.correct;

  // Highlight
  const opts=document.querySelectorAll('.quiz-option');
  opts.forEach((o,i)=>{
    o.classList.add('disabled');
    if(q.options[i].correct)o.classList.add('correct');
    if(i===optIdx&&!isCorrect)o.classList.add('wrong');
  });

  if(isCorrect){
    quizStreak++;
    if(quizStreak>quizMaxStreak)quizMaxStreak=quizStreak;
    const bonus=quizStreak>=3?2:1;
    quizScore+=10*bonus;
    // Update word progress
    const prog=getWordProgress(q.cat,q.idx);
    setWordProgress(q.cat,q.idx,{level:Math.min(5,prog.level+1),lastReview:Date.now()});
  }else{
    quizStreak=0;
    quizWrong.push(q);
    addWrongWord(q.cat,q.idx,q.word.w,q.word.m);
    const prog=getWordProgress(q.cat,q.idx);
    setWordProgress(q.cat,q.idx,{level:0,lastReview:Date.now()});
  }

  setTimeout(()=>{quizIndex++;renderQuizQuestion();},1200);
}

function quizSpellingSubmit(){
  if(quizAnswered)return;
  const inp=document.getElementById('spellingInput');
  if(!inp)return;
  const answer=inp.value.trim().toLowerCase();
  if(!answer)return;

  quizAnswered=true;
  clearInterval(quizTimerInterval);

  const q=quizQuestions[quizIndex];
  const correct=q.word.w.toLowerCase();
  const isCorrect=answer===correct;

  inp.classList.add(isCorrect?'correct':'wrong');
  inp.disabled=true;

  const fb=document.getElementById('spellingFeedback');
  if(isCorrect){
    quizStreak++;
    if(quizStreak>quizMaxStreak)quizMaxStreak=quizStreak;
    const bonus=quizStreak>=3?2:1;
    quizScore+=10*bonus;
    fb.innerHTML='<span style="color:var(--green)">正确！</span>';
    const prog=getWordProgress(q.cat,q.idx);
    setWordProgress(q.cat,q.idx,{level:Math.min(5,prog.level+1),lastReview:Date.now()});
  }else{
    quizStreak=0;
    quizWrong.push(q);
    addWrongWord(q.cat,q.idx,q.word.w,q.word.m);
    const prog=getWordProgress(q.cat,q.idx);
    setWordProgress(q.cat,q.idx,{level:0,lastReview:Date.now()});
    fb.innerHTML=`<span style="color:var(--accent)">正确答案：</span><span class="word-font" style="font-weight:600">${escHtml(q.word.w)}</span>`;
  }

  setTimeout(()=>{quizIndex++;renderQuizQuestion();},1500);
}

function quizTimeout(){
  quizAnswered=true;
  const q=quizQuestions[quizIndex];
  quizStreak=0;
  quizWrong.push(q);
  addWrongWord(q.cat,q.idx,q.word.w,q.word.m);

  if(q.type==='spelling'){
    const inp=document.getElementById('spellingInput');
    if(inp){inp.disabled=true;inp.classList.add('wrong');}
    const fb=document.getElementById('spellingFeedback');
    if(fb)fb.innerHTML=`<span style="color:var(--accent)">时间到！正确答案：</span><span class="word-font" style="font-weight:600">${escHtml(q.word.w)}</span>`;
  }else{
    const opts=document.querySelectorAll('.quiz-option');
    opts.forEach((o,i)=>{
      o.classList.add('disabled');
      if(q.options[i].correct)o.classList.add('correct');
    });
  }

  setTimeout(()=>{quizIndex++;renderQuizQuestion();},1500);
}

function renderQuizResults(){
  clearInterval(quizTimerInterval);
  const area=document.getElementById('quizArea');
  const total=quizQuestions.length;
  const correct=total-quizWrong.length;
  const pct=total?Math.round(correct/total*100):0;
  const elapsed=Math.round((Date.now()-quizStartTime)/1000);
  const mins=Math.floor(elapsed/60);
  const secs=elapsed%60;

  // Record daily
  const ds=todayStr();
  const s=getDailyStats(ds);
  setDailyStats(ds,{quizScore:Math.max(s.quizScore,pct)});

  let wrongHtml='';
  if(quizWrong.length>0){
    wrongHtml=`<div class="quiz-wrong-list"><h3>错题回顾</h3>${quizWrong.map(q=>`<div class="quiz-wrong-item"><span class="word-font">${escHtml(q.word.w)}</span><span>${escHtml(q.word.m)}</span></div>`).join('')}</div>`;
  }

  area.innerHTML=`<div class="quiz-results">
    <h2>测验完成！</h2>
    <div class="quiz-results-stats">
      <div class="quiz-results-stat"><div class="num" style="color:var(--green)">${pct}%</div><div class="label">正确率</div></div>
      <div class="quiz-results-stat"><div class="num">${correct}/${total}</div><div class="label">正确/总题</div></div>
      <div class="quiz-results-stat"><div class="num">${quizScore}</div><div class="label">得分</div></div>
      <div class="quiz-results-stat"><div class="num">${mins}:${secs.toString().padStart(2,'0')}</div><div class="label">用时</div></div>
      <div class="quiz-results-stat"><div class="num" style="color:#E8A87C">${quizMaxStreak}</div><div class="label">最长连对</div></div>
    </div>
    ${wrongHtml}
    <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      ${quizWrong.length>0?`<button class="btn btn-secondary" onclick="reviewWrongWords()">复习错题</button>`:''}
      <button class="btn btn-primary" onclick="startQuiz()">再来一轮</button>
      <button class="btn btn-secondary" onclick="renderQuiz()">返回设置</button>
    </div>
  </div>`;
}

function reviewWrongWords(){
  if(quizWrong.length===0)return;
  quizQuestions=[...quizWrong];
  quizIndex=0;quizScore=0;quizStreak=0;quizMaxStreak=0;quizWrong=[];
  quizStartTime=Date.now();quizAnswered=false;
  renderQuizQuestion();
}

// ===== Stats View =====
function renderStats(){
  // Progress rings
  const grid=document.getElementById('statsGrid');
  let html='';
  CATEGORIES.forEach(cat=>{
    const arr=cat.data();
    const learned=getCatLearnedCount(cat.id);
    const pct=arr.length?Math.round(learned/arr.length*100):0;
    const circumference=2*Math.PI*42;
    const offset=circumference-(pct/100)*circumference;
    const colorMap={zhongkao:'#E8A87C',gaokao:'#D27D2D',cet4:'#85CDCA',cet6:'#C38D9E',kaoyan:'#41B3A3'};
    html+=`<div class="stat-ring-card">
      <div class="stat-ring">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="stat-ring-bg" cx="50" cy="50" r="42"/>
          <circle class="stat-ring-fill" cx="50" cy="50" r="42" stroke="${colorMap[cat.id]}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="stat-ring-text">${pct}%</div>
      </div>
      <div class="stat-ring-label">${cat.name}</div>
      <div class="stat-ring-sub">${learned} / ${arr.length} 词</div>
    </div>`;
  });
  grid.innerHTML=html;

  // Daily chart
  const chart=document.getElementById('dailyChart');
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const s=getDailyStats(ds);
    const dayNames=['日','一','二','三','四','五','六'];
    days.push({date:ds,label:'周'+dayNames[d.getDay()],total:s.new+s.reviewed});
  }
  const maxVal=Math.max(...days.map(d=>d.total),1);
  chart.innerHTML=`<h3>近7天学习量</h3><div class="chart-bars">${days.map(d=>{
    const h=Math.max(4,d.total/maxVal*140);
    return`<div class="chart-bar-col"><div class="chart-bar-value">${d.total||''}</div><div class="chart-bar" style="height:${h}px" title="${d.date}: ${d.total}词"></div><div class="chart-bar-label">${d.label}</div></div>`;
  }).join('')}</div>`;

  // Wrong notebook
  const nb=document.getElementById('wrongNotebook');
  const wrongs=getWrongWords();
  if(wrongs.length===0){
    nb.innerHTML=`<h3>错题本</h3><div class="empty-state"><p>暂无错题，继续加油！</p></div>`;
  }else{
    const catNameMap={zhongkao:'中考',gaokao:'高考',cet4:'四级',cet6:'六级',kaoyan:'考研'};
    nb.innerHTML=`<h3>错题本 (${wrongs.length})</h3><div class="wrong-list">${wrongs.slice(0,100).map(w=>`<div class="wrong-item">
      <span class="wrong-item-word word-font">${escHtml(w.word)}</span>
      <span class="wrong-item-meaning">${escHtml(w.meaning)}</span>
      <span class="wrong-item-cat">${catNameMap[w.cat]||w.cat}</span>
      <button class="btn-icon" onclick="removeWrongWord('${w.key}');renderStats()" title="移除" style="width:28px;height:28px;font-size:0.8rem">&#10005;</button>
    </div>`).join('')}</div>`;
  }
}

// ===== Keyboard Shortcuts =====
document.addEventListener('keydown',e=>{
  if(currentView==='flashcard'&&document.getElementById('flashcardArea').style.display!=='none'){
    if(e.code==='Space'){e.preventDefault();flipCard();}
    else if(e.code==='ArrowLeft'&&!quizAnswered){fcAnswer('dontknow');}
    else if(e.code==='ArrowRight'&&!quizAnswered){fcAnswer('know');}
  }
});

// ===== Init =====
document.addEventListener('DOMContentLoaded',()=>{
  renderHome();
});
